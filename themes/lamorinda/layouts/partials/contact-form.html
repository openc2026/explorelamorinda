<!-- Contact Form - FormSubmit.co (no registration required) -->
<div class="contact-form-wrapper" id="contact-form">
  <div class="contact-form-header">
    <h2>Get in Touch with Vlatka</h2>
    <p>Ready to buy or sell in Lamorinda? Whether you're just starting to explore or ready to make a move, I'd love to help.</p>
  </div>
  
  <form action="https://formsubmit.co/vlatka@bestlamorindahomes.com" method="POST" class="contact-form">
    <!-- CC additional recipients -->
    <input type="hidden" name="_cc" value="vlatka.bathgate@camoves.com,openc2026@outlook.com">
    
    <!-- Subject line for email -->
    <input type="hidden" name="_subject" value="New Lead from ExploreLamorinda.com — Lamorinda Real Estate Inquiry">
    
    <!-- Redirect after submission -->
    <input type="hidden" name="_next" value="{{ .Site.BaseURL }}real-estate/thank-you/">
    
    <!-- Disable captcha (optional - remove if you want captcha) -->
    <input type="hidden" name="_captcha" value="false">
    
    <!-- Honeypot for spam protection -->
    <input type="text" name="_honey" style="display:none">
    
    <!-- Template for nicer emails -->
    <input type="hidden" name="_template" value="table">
    
    <div class="form-row">
      <div class="form-group">
        <label for="name">Name *</label>
        <input type="text" id="name" name="name" required placeholder="Your full name">
      </div>
      <div class="form-group">
        <label for="phone">Phone *</label>
        <input type="tel" id="phone" name="phone" required placeholder="(555) 123-4567">
      </div>
    </div>
    
    <div class="form-group">
      <label for="email">Email *</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com">
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label for="interest">I'm interested in...</label>
        <select id="interest" name="Interest">
          <option value="">Select an option</option>
          <option value="Buying a home">Buying a home</option>
          <option value="Selling my home">Selling my home</option>
          <option value="Both buying and selling">Both buying and selling</option>
          <option value="Just exploring the market">Just exploring the market</option>
        </select>
      </div>
      <div class="form-group">
        <label for="timeline">Timeline</label>
        <select id="timeline" name="Timeline">
          <option value="">When are you looking to move?</option>
          <option value="As soon as possible">As soon as possible</option>
          <option value="1-3 months">1-3 months</option>
          <option value="3-6 months">3-6 months</option>
          <option value="6-12 months">6-12 months</option>
          <option value="Just exploring">Just exploring</option>
        </select>
      </div>
    </div>
    
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="4" placeholder="Tell me about what you're looking for, questions you have, or anything else I should know..."></textarea>
    </div>
    
    <button type="submit" class="btn-submit">
      <span>Send Message</span>
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
    
    <p class="form-disclaimer">Your information is kept confidential and will never be shared or sold.</p>
  </form>
</div>
